name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pydantic
      
      - name: Build EXE
        run: |
          pip install pyinstaller
          pyinstaller --onefile --windowed --name DailyReport --hidden-import=pydantic --collect-all pydantic app.py
          
          if (Test-Path dist/DailyReport.exe) {
            $size = (Get-Item dist/DailyReport.exe).Length / 1MB
            Write-Host "EXE 大小：$([math]::Round($size, 2)) MB"
            if ($size -gt 15) {
              Write-Host "⚠️ 警告：文件超过 15MB"
            } else {
              Write-Host "✅ 文件大小符合要求 (< 15MB)"
            }
          } else {
            Write-Host "❌ 编译失败"
            exit 1
          }
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/DailyReport.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
