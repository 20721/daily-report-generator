name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Install dependencies
        run: |
          go mod download
          go mod tidy
          # 安装 walk 依赖的 Windows 资源编译器
          choco install golangci-lint -y
      
      - name: Build EXE
        run: |
          cd cmd/report
          go build -ldflags="-s -w -H=windowsgui" -o ../../output/report.exe .
          
          if (Test-Path ../../output/report.exe) {
            $size = (Get-Item ../../output/report.exe).Length / 1MB
            Write-Host "EXE 大小：$([math]::Round($size, 2)) MB"
            if ($size -gt 15) {
              Write-Host "⚠️ 警告：文件超过 15MB"
            } else {
              Write-Host "✅ 文件大小符合要求 (< 15MB)"
            }
          } else {
            Write-Host "❌ 编译失败"
            exit 1
          }
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: output/report.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
